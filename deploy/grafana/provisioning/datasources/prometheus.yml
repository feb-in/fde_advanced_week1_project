# Grafana datasource provisioning — auto-connects Grafana to Prometheus on startup,
# so the stack comes up wired with no manual clicking. `prometheus` is the compose
# service name (resolves on the compose network).
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

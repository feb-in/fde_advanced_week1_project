# Docker-compatible compose for `podman compose` (Podman v4+) or `podman-compose`.
# Observability stack (Stage 6 SETUP): api (instrumented) + prometheus + grafana.
#
#   uv run python deploy/export_model.py   # ensure the baked bundle exists
#   podman compose up --build -d
#
#   API        http://localhost:8000  (/health /predict /metrics)
#   Prometheus http://localhost:9090  (Status → Targets: readmission-api = UP)
#   Grafana    http://localhost:3000  (admin/admin; Prometheus datasource auto-provisioned)
#
# SELinux note (Podman): bind mounts carry :Z so they are relabeled for the container.
services:
  api:
    build:
      context: .
      dockerfile: deploy/Containerfile
    image: readmission-api:latest
    container_name: readmission-api
    ports:
      - "8000:8000"
    environment:
      # The model is baked into the image (deploy/export_model.py). No registry
      # mount needed. Rollback = re-point the @staging alias, re-export, rebuild
      # (or roll the image tag back to a previously-good build).
      MODEL_BUNDLE_DIR: /app/model_bundle
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: readmission-prometheus
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:Z   # scrapes api:8000/metrics
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: readmission-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      # Datasource is auto-provisioned (Prometheus). Dashboards come next session.
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:Z
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped


# Docker-compatible compose for `podman compose` (Podman v4+) or `podman-compose`.
# Brings up the API now; observability services are scaffolded but NOT wired (Stage 6).
#
#   podman compose up --build
#
services:
  api:
    build:
      context: .
      dockerfile: deploy/Containerfile
    image: readmission-api:latest
    container_name: readmission-api
    ports:
      - "8000:8000"
    environment:
      # The model is baked into the image (deploy/export_model.py). No registry
      # mount needed. Rollback = re-point the @staging alias, re-export, rebuild
      # (or roll the image tag back to a previously-good build).
      MODEL_BUNDLE_DIR: /app/model_bundle
    restart: unless-stopped
    # Note: build requires the bundle to exist first —
    #   uv run python deploy/export_model.py && podman compose up --build

